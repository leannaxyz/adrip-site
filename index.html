<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADRIP | Private Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b38b4d;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            box-shadow: inset 0 0 0 15px var(--bg-black), 
                        inset 0 0 0 16px rgba(179, 139, 77, 0.25);
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Subtle Vault Texture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04;
            pointer-events: none;
            z-index: 2;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .container {
            position: relative;
            z-index: 3;
            width: 100%;
            max-width: 310px; 
            padding: 20px;
            text-align: center;
        }

        /* Logo Integration */
        .logo-img {
            width: 180px;
            height: auto;
            margin-bottom: 5px;
            filter: brightness(1.2); /* Makes the white pop */
        }

        .brand-subtitle {
            text-transform: uppercase;
            font-size: 0.6rem;
            font-weight: 400;
            letter-spacing: 5px;
            margin-bottom: 50px;
            color: rgba(255,255,255,0.5);
        }

        .divider {
            height: 1px;
            width: 40px;
            background: var(--gold);
            margin: 0 auto 50px;
            opacity: 0.4;
        }

        .section-label {
            color: var(--gold);
            text-transform: uppercase;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .master-name {
            font-size: 1.8rem;
            font-weight: 200;
            margin-bottom: 60px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .capsule-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px 5px;
            margin-bottom: 70px;
        }

        .capsule-item {
            font-size: 0.8rem;
            font-weight: 400;
            color: rgba(255,255,255,0.6);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .cta-header {
            font-weight: 700;
            font-size: 0.65rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .cta-instruction {
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: #fff;
            color: #000;
            border: none;
            padding: 22px 10px;
            width: 100%;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.75rem;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
            transition: transform 0.2s ease;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="adrip" class="logo-img">
        
        <div class="brand-subtitle">Custom Grillz & Fine Jewelry</div>
        <div class="cta-instruction" style="margin-top: -35px; margin-bottom: 40px;">By Appointment Only</div>
        
        <div class="divider"></div>

        <div class="section-label">Master Jeweler</div>
        <div class="master-name">Ashton Coates</div>

        <div class="capsule-grid">
            <div class="capsule-item">Custom Grillz</div>
            <div class="capsule-item">VVS+ Setting</div>
            <div class="capsule-item">Private Commissions</div>
            <div class="capsule-item">Restoration & Upgrade</div>
        </div>

        <div class="cta-header">Appointments Limited</div>
        <div class="cta-instruction">Call to request availability.</div>

        <a href="tel:8436234469" class="btn-primary">Call to Book Private Consultations</a>
    </div>

</body>
</html>
