<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADRIP | Private Atelier</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b38b4d;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cormorant Garamond', serif;
            color: #fff;
            box-shadow: inset 0 0 0 15px var(--bg-black), 
                        inset 0 0 0 16px rgba(179, 139, 77, 0.3);
            box-sizing: border-box;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 310px; 
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: var(--gold);
            font-size: 4.2rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: 4px;
            text-transform: lowercase;
            line-height: 1;
        }

        .brand-subtitle {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 8px;
            margin: 12px 0 65px;
            color: rgba(255,255,255,0.4);
        }

        .section-label {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold);
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .master-name {
            font-size: 1.9rem;
            font-weight: 300;
            margin-bottom: 65px;
            letter-spacing: 1px;
        }

        .capsule-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px 5px;
            margin-bottom: 65px;
        }

        .capsule-item {
            font-size: 0.95rem;
            font-weight: 300;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
        }

        /* Digital Concierge Framing */
        .concierge-header {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.7rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 25px;
        }

        .btn-primary {
            background: #fff;
            color: #000;
            border: none;
            padding: 20px;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            margin-bottom: 12px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.5);
            padding: 16px;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>adrip</h1>
        <div class="brand-subtitle">Private Atelier</div>
        
        <div class="section-label">Master Jeweler</div>
        <div class="master-name">Ashton Coates</div>

        <div class="capsule-grid">
            <div class="capsule-item">Bespoke Grillz</div>
            <div class="capsule-item">VVS Setting</div>
            <div class="capsule-item">Private Commission</div>
            <div class="capsule-item">Restoration</div>
        </div>

        <div class="concierge-header">Digital Concierge</div>

        <a href="tel:8436234469" class="btn-primary">Request Session</a>
        <a href="mailto:ashtonthejeweler@gmail.com?subject=Private%20Atelier%20Inquiry" class="btn-secondary">Begin Consultation</a>
    </div>

</body>
</html>
