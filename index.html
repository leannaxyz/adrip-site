<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>adrip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06070b;
      --panel: #07080d;
      --text: #f4f1ea;
      --muted: #9fa0aa;
      --line: rgba(212, 170, 67, 0.18);
      --gold: #d4aa43;
      --gold-deep: #b9912f;
      --button-dark: #151520;
      --button-border: rgba(255,255,255,0.18);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: var(--text);
      font-family: "Inter", Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .shell {
      width: 100%;
      max-width: 760px;
      background: var(--panel);
      border: 2px solid var(--gold);
      border-radius: 28px;
      padding: 44px 28px 36px;
      box-shadow: 0 0 0 1px rgba(212, 170, 67, 0.05) inset;
    }

    .brand {
      text-align: center;
      margin-bottom: 18px;
    }

    .brand-name {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(3.8rem, 8vw, 5.5rem);
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--gold);
      text-transform: lowercase;
      line-height: 0.95;
    }

    .tagline {
      margin: 10px 0 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.1rem, 2.5vw, 1.6rem);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #b7b5c4;
      line-height: 1.2;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 28px auto;
      width: 86%;
    }

    .section {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .label {
      margin: 0 0 8px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.04em;
      text-transform: lowercase;
    }

    .name {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.1rem, 4vw, 3rem);
      font-weight: 500;
      color: #ffffff;
      line-height: 1.1;
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 26px;
      margin-top: 10px;
    }

    .service {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      line-height: 1.15;
      color: #f2f1f6;
    }

    .service .bullet {
      color: #ffffff;
      margin-right: 8px;
    }

    .appointment-title {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.3rem, 4vw, 3.3rem);
      font-weight: 700;
      color: #ffffff;
      line-height: 1.05;
      text-transform: lowercase;
    }

    .location {
      margin: 8px 0 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
      color: #a7a7b3;
      text-transform: lowercase;
      line-height: 1.05;
    }

    .actions {
      width: 100%;
      max-width: 560px;
      margin: 34px auto 0;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      border-radius: 6px;
      padding: 22px 18px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .btn-primary {
      background: var(--gold);
      color: #0a0a0d;
      border: 1px solid var(--gold-deep);
      text-transform: lowercase;
    }

    .phone-wrap {
      display: flex;
      justify-content: center;
    }

    .btn-phone {
      width: auto;
      min-width: 320px;
      background: var(--button-dark);
      color: var(--gold);
      border: 1px solid rgba(255,255,255,0.06);
      padding-left: 28px;
      padding-right: 28px;
    }

    .btn-outline {
      background: transparent;
      color: #f1eef0;
      border: 1px solid var(--button-border);
      text-transform: lowercase;
    }

    @media (max-width: 640px) {
      .shell {
        padding: 34px 18px 26px;
        border-radius: 22px;
      }

      .divider {
        width: 100%;
      }

      .section,
      .actions {
        max-width: 100%;
      }

      .services-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px 18px;
      }

      .btn-phone {
        min-width: 0;
        width: 100%;
      }
    }

    @media (max-width: 460px) {
      .services-grid {
        grid-template-columns: 1fr;
      }

      .brand-name {
        letter-spacing: 0.08em;
      }

      .tagline {
        letter-spacing: 0.18em;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="brand">
      <h1 class="brand-name">adrip</h1>
      <p class="tagline">Fine Jewelry &amp; Custom<br>Design</p>
    </header>

    <div class="divider"></div>

    <section class="section">
      <h2 class="label">founder &amp; master jeweler</h2>
      <p class="name">Ashton Coates</p>
    </section>

    <div class="divider"></div>

    <section class="section">
      <h2 class="label">specialized services</h2>
      <div class="services-grid">
        <div class="service"><span class="bullet">•</span>Custom Engagement</div>
        <div class="service"><span class="bullet">•</span>Expert Resizing</div>
        <div class="service"><span class="bullet">•</span>Professional Repair</div>
        <div class="service"><span class="bullet">•</span>Luxury Cleaning</div>
      </div>
    </section>

    <div class="divider"></div>

    <section class="section">
      <h2 class="appointment-title">by appointment only</h2>
      <p class="location">cheraw, south carolina</p>
    </section>

    <section class="actions">
      <a class="btn btn-primary" href="tel:18436234469">call for appointment</a>

      <a class="btn btn-outline" href="mailto:ashtonthejeweler@gmail.com">email inquiry</a>
    </section>
  </main>
</body>
</html>
