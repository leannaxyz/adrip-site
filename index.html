<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrip Fine Jewelry</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Times New Roman', serif; /* Serif for that luxury feel */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card-border {
            border: 1px solid #c5a059;
            border-radius: 30px;
            padding: 40px 20px;
            width: 350px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        h1 {
            color: #c5a059;
            font-size: 3rem;
            font-weight: normal;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: #e0e0e0;
        }

        hr {
            border: 0;
            border-top: 1px solid #333;
            width: 80%;
            margin: 20px auto;
        }

        .label {
            color: #c5a059;
            font-style: italic;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .name {
            font-size: 1.4rem;
            margin-bottom: 30px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: left;
            font-size: 0.85rem;
            gap: 15px;
            margin: 20px auto;
            width: 90%;
        }

        .service-item::before {
            content: "• ";
            color: #fff;
        }

        .location-section {
            margin-top: 40px;
        }

        .appointment-text {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .city-text {
            text-transform: lowercase;
            font-size: 0.85rem;
            color: #888;
        }

        .btn-gold {
            background-color: #d4af37;
            color: #000;
            border: none;
            padding: 15px;
            width: 90%;
            font-weight: bold;
            text-transform: lowercase;
            letter-spacing: 1px;
            margin-top: 30px;
            border-radius: 4px;
            cursor: pointer;
        }

        .phone-display {
            background-color: #1a1a1a;
            color: #c5a059;
            padding: 12px;
            width: 50%;
            margin: 15px auto;
            border-radius: 8px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 15px;
            width: 90%;
            margin-top: 20px;
            text-transform: lowercase;
            letter-spacing: 1px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card-border">
        <h1>adrip</h1>
        <div class="subtitle">Fine Jewelry & Custom Design</div>
        
        <hr>

        <div class="label">founder & master jeweler</div>
        <div class="name">Ashton Coates</div>

        <div class="label">specialized services</div>
        <div class="services-grid">
            <div class="service-item">Custom Engagement</div>
            <div class="service-item">Expert Resizing</div>
            <div class="service-item">Professional Repair</div>
            <div class="service-item">Luxury Cleaning</div>
        </div>

        <hr>

        <div class="location-section">
            <div class="appointment-text">by appointment only</div>
            <div class="city-text">cheraw, south carolina</div>
        </div>

        <button class="btn-gold">call for appointment</button>
        
        <div class="phone-display">(843) 623-4469</div>

        <button class="btn-outline">email inquiry</button>
    </div>

</body>
</html>
