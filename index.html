<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrip Fine Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b38b4d;
            --light-gold: #d4af37;
            --bg-black: #0a0a0a;
        }

        body {
            background-color: var(--bg-black);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cormorant Garamond', serif;
            color: #fff;
            box-shadow: inset 0 0 0 15px var(--bg-black), 
                        inset 0 0 0 16px var(--gold);
            box-sizing: border-box;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.06;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 380px;
            padding: 60px 35px;
            text-align: center;
        }

        h1 {
            color: var(--gold);
            font-size: 4rem;
            font-weight: 300;
            margin: 0;
            /* Changed from 12px to 6px for tighter spacing */
            letter-spacing: 6px; 
            text-transform: lowercase;
        }

        .subtitle {
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 5px;
            margin: 10px 0 60px;
            color: #555;
            white-space: nowrap;
        }

        .label {
            color: var(--gold);
            text-transform: lowercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 60px;
            letter-spacing: 2px;
            color: #efefef;
        }

        .services-container {
            display: inline-block;
            margin: 0 auto 60px;
            text-align: left;
        }

        .services-grid {
            display: grid;
            grid-template-columns: auto auto;
            gap: 20px 35px;
            font-size: 0.85rem;
            color: #888;
        }

        .service-item {
            display: flex;
            align-items: center;
        }

        .service-item::before {
            content: "";
            display: inline-block;
            width: 3px;
            height: 3px;
            background: var(--gold);
            margin-right: 12px;
        }

        .location-section {
            margin-bottom: 50px;
        }

        .appointment-text {
            font-weight: 600;
            font-size: 1rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ccc;
        }

        .city-text {
            text-transform: lowercase;
            font-size: 0.8rem;
            color: #333;
            letter-spacing: 4px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #c5a059, #866635);
            color: #000;
            border: none;
            padding: 20px;
            width: 100%;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 3px;
            font-size: 0.95rem;
            margin-bottom: 15px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #222;
            color: #444;
            padding: 15px;
            width: 100%;
            text-transform: lowercase;
            letter-spacing: 3px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            display: block;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>adrip</h1>
        <div class="subtitle">Fine Jewelry & Custom Design</div>
        
        <div class="label">founder & master jeweler</div>
        <div class="name">Ashton Coates</div>

        <div class="label">specialized services</div>
        <div class="services-container">
            <div class="services-grid">
                <div class="service-item">Custom Engagement</div>
                <div class="service-item">Expert Resizing</div>
                <div class="service-item">Professional Repair</div>
                <div class="service-item">Luxury Cleaning</div>
            </div>
        </div>

        <div class="location-section">
            <div class="appointment-text">by appointment only</div>
            <div class="city-text">cheraw, south carolina</div>
        </div>

        <a href="tel:8436234469" class="btn-gold">call for appointment</a>
        <a href="mailto:ashtonthejeweler@gmail.com?subject=Appointment%20Inquiry%3A%20Adrip%20Fine%20Jewelry" class="btn-outline">email inquiry</a>
    </div>

</body>
</html>
