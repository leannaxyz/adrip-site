<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrip Fine Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b38b4d;
            --dark-gold: #866635;
            --bg-black: #0a0a0a;
        }

        body {
            /* This creates a subtle 'grain' texture using a repeating radial gradient */
            background-color: var(--bg-black);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 3px 3px; 
            color: #fff;
            font-family: 'Cormorant Garamond', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card-border {
            /* Subtle 'Metal' Gradient Border */
            border: 1px solid;
            border-image: linear-gradient(to bottom, var(--gold), var(--dark-gold)) 1;
            padding: 70px 40px;
            width: 400px;
            text-align: center;
            background: #050505;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        h1 {
            color: var(--gold);
            font-size: 4rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: 12px;
            text-transform: lowercase;
        }

        .subtitle {
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 6px;
            margin-top: 15px;
            margin-bottom: 60px;
            color: #888;
        }

        /* Minimalist Divider instead of diamond */
        .divider-line {
            width: 40px;
            height: 1px;
            background-color: var(--gold);
            margin: 0 auto 40px;
        }

        .label {
            color: var(--gold);
            font-weight: 400;
            text-transform: lowercase;
            font-size: 1.1rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .name {
            font-size: 2rem;
            margin-bottom: 60px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: left;
            font-size: 1.1rem;
            gap: 25px;
            margin-bottom: 60px;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
        }

        .service-item::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--gold);
            margin-right: 10px;
            vertical-align: middle;
        }

        .location-section {
            margin-bottom: 50px;
        }

        .appointment-text {
            font-weight: 600;
            font-size: 1.3rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .city-text {
            text-transform: lowercase;
            font-size: 1rem;
            color: #666;
            letter-spacing: 3px;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: #000;
            border: none;
            padding: 20px;
            width: 100%;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 3px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #222;
            color: #666;
            padding: 18px;
            width: 100%;
            text-transform: lowercase;
            letter-spacing: 3px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="card-border">
        <h1>adrip</h1>
        <div class="subtitle">Fine Jewelry & Custom Design</div>
        
        <div class="divider-line"></div>

        <div class="label">founder & master jeweler</div>
        <div class="name">Ashton Coates</div>

        <div class="label">specialized services</div>
        <div class="services-grid">
            <div class="service-item">Custom Engagement</div>
            <div class="service-item">Expert Resizing</div>
            <div class="service-item">Professional Repair</div>
            <div class="service-item">Luxury Cleaning</div>
        </div>

        <div class="location-section">
            <div class="appointment-text">by appointment only</div>
            <div class="city-text">cheraw, south carolina</div>
        </div>

        <button class="btn-gold" onclick="window.location.href='tel:8436234469'">call for appointment</button>
        
        <button class="btn-outline">email inquiry</button>
    </div>

</body>
</html>
