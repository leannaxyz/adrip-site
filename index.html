<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrip Fine Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b38b4d;
            --light-gold: #d4af37;
            --bg-black: #0a0a0a;
        }

        body {
            background-color: var(--bg-black);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Cormorant Garamond', serif;
            color: #fff;
        }

        /* Subtle silk texture */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.07;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        /* The Gold Frame */
        .page-border {
            position: fixed;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 1px solid;
            border-image: linear-gradient(to bottom, var(--light-gold), var(--gold), #5e4a2a) 1;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 380px;
            padding: 40px 25px;
            text-align: center;
        }

        h1 {
            color: var(--gold);
            font-size: 4rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: 12px;
            text-transform: lowercase;
        }

        .subtitle {
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 5px;
            margin: 10px 0 70px;
            color: #666;
            white-space: nowrap;
        }

        .label {
            color: var(--gold);
            text-transform: lowercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 70px;
            letter-spacing: 2px;
            color: #efefef;
        }

        .services-container {
            display: inline-block;
            margin: 0 auto 70px;
            text-align: left;
        }

        .services-grid {
            display: grid;
            grid-template-columns: auto auto;
            gap: 20px 35px;
            font-size: 0.85rem;
            color: #999;
        }

        .service-item {
            display: flex;
            align-items: center;
        }

        .service-item::before {
            content: "";
            display: inline-block;
            width: 3px;
            height: 3px;
            background: var(--gold);
            margin-right: 12px;
        }

        .location-section {
            margin-bottom: 50px;
        }

        .appointment-text {
            font-weight: 600;
            font-size: 1.05rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            color: #ccc;
        }

        .city-text {
            text-transform: lowercase;
            font-size: 0.8rem;
            color: #3d3d3d;
            letter-spacing: 4px;
        }

        .btn-gold {
            background: linear-gradient(135deg, #c5a059, #866635);
            color: #000;
            border: none;
            padding: 20px;
            width: 100%;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 3px;
            font-size: 0.95rem;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            pointer-events: auto; /* Ensures button works through the frame */
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #1a1a1a;
            color: #444;
            padding: 15px;
            width: 100%;
            text-transform: lowercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            cursor: pointer;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="page-border"></div>

    <div class="container">
        <h1>adrip</h1>
        <div class="subtitle">Fine Jewelry & Custom Design</div>
        
        <div class="label">founder & master jeweler</div>
        <div class="name">Ashton Coates</div>

        <div class="label">specialized services</div>
        <div class="services-container">
            <div class="services-grid">
                <div class="service-item">Custom Engagement</div>
                <div class="service-item">Expert Resizing</div>
                <div class="service-item">Professional Repair</div>
                <div class="service-item">Luxury Cleaning</div>
            </div>
        </div>

        <div class="location-section">
            <div class="appointment-text">by appointment only</div>
            <div class="city-text">cheraw, south carolina</div>
        </div>

        <button class="btn-gold" onclick="window.location.href='tel:8436234469'">call for appointment</button>
        <button class="btn-outline">email inquiry</button>
    </div>

</body>
</html>
