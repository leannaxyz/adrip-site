<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADRIP | Private Jeweler</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "JewelryStore",
      "name": "adrip",
      "founder": "Ashton Coates",
      "url": "https://leannaxyz.github.io",
      "description": "Bespoke Private Jeweler specializing in high-grade dental gold and custom commissions.",
      "brand": {
        "@type": "Brand",
        "name": "adrip"
      }
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #b38b4d;
            --muted-gold: #7a5a2d;
            --bg-black: #050505;
        }

        body {
            background-color: var(--bg-black);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Cormorant Garamond', serif;
            color: #fff;
            /* Thin, surgical precision border */
            box-shadow: inset 0 0 0 10px var(--bg-black), 
                        inset 0 0 0 11px rgba(179, 139, 77, 0.3);
            box-sizing: border-box;
            overflow: hidden;
        }

        /* Ultra-fine silk texture for high-res screens */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.04;
            pointer-events: none;
            z-index: 1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 340px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: var(--gold);
            font-size: 4.5rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: 8px; /* Balanced for impact */
            text-transform: lowercase;
            line-height: 1;
        }

        .brand-subtitle {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            font-size: 0.65rem;
            letter-spacing: 8px;
            margin: 15px 0 80px;
            color: rgba(255,255,255,0.4);
        }

        .section-label {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold);
            text-transform: uppercase;
            font-size: 0.6rem;
            letter-spacing: 4px;
            margin-bottom: 12px;
        }

        .master-name {
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 80px;
            letter-spacing: 1px;
            color: #fff;
        }

        .capsule-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 80px;
            text-align: center;
        }

        .capsule-item {
            font-size: 0.95rem;
            font-weight: 300;
            color: rgba(255,255,255,0.7);
            letter-spacing: 1px;
        }

        .appointment-block {
            margin-bottom: 50px;
        }

        .appointment-status {
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            font-size: 0.75rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .btn-primary {
            background: #fff; /* High-fashion shift: White button on black */
            color: #000;
            border: none;
            padding: 22px;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: 0.4s;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            padding: 18px;
            width: 100%;
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>adrip</h1>
        <div class="brand-subtitle">Private Atelier</div>
        
        <div class="section-label">Master Jeweler</div>
        <div class="master-name">Ashton Coates</div>

        <div class="capsule-grid">
            <div class="capsule-item">Dental Gold</div>
            <div class="capsule-item">Custom Iced</div>
            <div class="capsule-item">Commission</div>
            <div class="capsule-item">Restoration</div>
        </div>

        <div class="appointment-block">
            <div class="appointment-status">Strictly by Appointment</div>
        </div>

        <a href="tel:8436234469" class="btn-primary">Request Session</a>
        <a href="mailto:ashtonthejeweler@gmail.com?subject=Private%20Commission%20Inquiry" class="btn-secondary">Inquiry</a>
    </div>

</body>
</html>
